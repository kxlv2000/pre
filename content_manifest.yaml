# 面试网页内容清单：幻灯片叙事 + 从 PDF 抽取的配图（pypdf 内嵌图）
# 路径均相对于项目根目录；拷贝整个 presentation 文件夹即可保持链接有效

jd_keywords:
  - evaluation_driven_agents
  - multi_agent_tooling
  - systems_inference_training
  - automated_eval_infra
  - automotive_cockpit_plus

folder_jd_mapping:
  "Vertical AI research":
    jd: [evaluation_driven_agents, systems_inference_training, automotive_cockpit_plus]
    highlights:
      - 座舱多模态 VLM：数据挖掘、自动标注、全参 SFT、端侧 QNN 量化与算子适配
      - Joint-BERT NLU：意图分类 + 工具槽位抽取，支撑「可调用工具」的交互闭环
      - AI 代驾：VLMEvalKit 接入与评测向开发文档
  "Horizontal AI application":
    jd: [evaluation_driven_agents, automated_eval_infra, multi_agent_tooling]
    highlights:
      - 10+ 内部效率 Agent；企业级 Qwen3 / DeepSeek vLLM 工具链
      - 导师带 10+ 实习生；周会推进多探索项目（文档比对、政策/论文研讨等）
      - Feishu Aily / Hackathon 人才池简历打分等「评测驱动」落地
  "Legacy CV perception project":
    jd: [systems_inference_training, automotive_cockpit_plus]
    highlights:
      - BEV 车道/底图预标、流式裁剪增广、DeepSpeed 多卡流水线
  "Innovus capital 创业":
    jd: [evaluation_driven_agents, automated_eval_infra]
    highlights:
      - 本地 Qwen3 金融分析、舆情 + 量化 + 结构化研报自动生成流水线
  "Paper submission Structured Runtime Safety Monitoring for Camera-Based Driver Monitoring Systems":
    jd: [evaluation_driven_agents, automotive_cockpit_plus]
    highlights:
      - DMS 混合 YOLOv11–Qwen3-VL L1/L2 实时安全监控管线（论文 ITSC 2026）

